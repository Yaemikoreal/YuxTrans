<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YuxTrans</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="brand">
      <h1>YuxTrans</h1>
      <span class="version" id="versionBadge"></span>
    </div>
    <button class="icon-btn" id="settingsBtn">设置</button>
  </div>

  <div class="control-row">
    <span class="status-pill checking" id="connectionStatus">
      <span class="status-dot"></span>
      <span id="connectionText">检测中</span>
    </span>
    <select class="model-select" id="modelSelect">
      <option value="">加载中...</option>
    </select>
  </div>

  <button class="action-btn" id="translatePageBtn">翻译整页</button>

  <div class="mode-row">
    <div>
      <div class="mode-label">翻译模式</div>
      <div class="mode-hint">整页翻译显示方式</div>
    </div>
    <div class="mode-toggle" id="modeToggle" role="group" aria-label="翻译模式">
      <button class="mode-toggle-btn" data-mode="mono" id="modeMonoBtn" type="button">仅译文</button>
      <button class="mode-toggle-btn" data-mode="bilingual" id="modeBilingualBtn" type="button">双语</button>
      <span class="mode-toggle-indicator"></span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value" id="tokenStat">-- / --</div>
      <div class="stat-label">会话 / 累计 Tokens</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="cacheHitStat">--</div>
      <div class="stat-label">缓存命中</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="cacheEntryStat">--</div>
      <div class="stat-label">缓存条目</div>
    </div>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">流式翻译</div>
      <div class="toggle-hint">默认使用流式输出</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="streamToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="toast" class="toast"></div>

  <script src="common.js"></script>
  <script src="popup.js"></script>
</body>
</html>
