<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YuxTrans 翻译</title>
  <style>
    :root {
      /* Warm Paper (护眼书页) 全局风格对齐 */
      --bg-primary: #fdfbf7;
      --bg-gradient: radial-gradient(circle at 50% 50%, #fefcf9 0%, #f2ede4 100%);
      --bg-card: rgba(255, 255, 255, 0.8);
      --bg-secondary: rgba(140, 130, 121, 0.05);
      
      --text-main: #3d3733; 
      --text-secondary: #8c8279;
      
      --brass: #d8a051;
      --brass-hover: #eebb77;
      --brass-gradient: linear-gradient(135deg, #dfab66 0%, #d19747 100%);
      --brass-text: #ffffff;
      
      --border-color: rgba(61, 55, 51, 0.08);
      --shadow-deep: 0 16px 40px rgba(61, 55, 51, 0.1);
      
      --glass-blur: 32px;
      --radius-outer: 28px;
      --radius-inner: 18px;
      --padding-main: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      width: 320px; 
      background: var(--bg-primary);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      padding: var(--padding-main);
      display: flex;
      flex-direction: column;
      gap: 16px; 
      border-radius: var(--radius-outer); 
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-deep);
    }

    /* 顶部导航栏 - Warm Paper 风格 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 4px;
    }

    .header h1 {
      font-size: 14px; 
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-main);
      opacity: 0.8;
    }

    .header-btns {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 6px 10px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .icon-btn:hover {
      background: rgba(216, 160, 81, 0.1);
      color: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* 输入/输出卡片 - 等距圆角与磨砂玻璃 */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(var(--glass-blur)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-inner);
      padding: 16px;
      box-shadow: 0 8px 24px rgba(61, 55, 51, 0.05);
      transition: all 0.4s;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    label {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .lang-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      color: var(--brass);
      border: 1px solid rgba(216, 160, 81, 0.1);
    }

    textarea {
      width: 100%;
      height: 90px; 
      background: transparent;
      border: none;
      resize: none;
      font-size: 14.5px;
      line-height: 1.6;
      font-family: inherit;
      color: var(--text-main);
      outline: none;
    }

    textarea::placeholder {
      color: var(--text-secondary);
      opacity: 0.4;
    }

    /* 核心按钮 - 黄铜金属质感（调优对比度） */
    .translate-btn {
      width: 100%;
      padding: 14px;
      background: var(--brass-gradient);
      color: var(--brass-text);
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(216, 160, 81, 0.25);
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .translate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(216, 160, 81, 0.35);
    }
    
    .translate-btn:active {
      transform: translateY(0) scale(0.98);
      opacity: 0.9;
    }

    /* 结果显示 - 呼吸感控制 */
    .result-section {
      display: none;
      margin-top: -2px;
    }

    .result-section.active {
      display: block;
      animation: materialRise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes materialRise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      min-height: 90px;
      max-height: 200px;
      overflow-y: auto;
      border-color: rgba(216, 160, 81, 0.1);
    }

    .result-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--text-main);
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-action {
      flex: 1;
      padding: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s;
    }

    .btn-action:hover {
      background: rgba(216, 160, 81, 0.05);
      border-color: var(--brass);
      color: var(--brass);
    }

    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--brass);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(216, 160, 81, 0.1);
      border-top-color: var(--brass);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #fff;
      color: var(--brass);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 800;
      z-index: 1000;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-deep);
      transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      opacity: 0;
      white-space: nowrap;
      backdrop-filter: blur(20px);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #switchLangBtn {
      border: none;
      background: transparent;
      width: 24px;
      height: 24px;
      cursor: pointer;
      color: var(--accent);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      opacity: 0.6;
    }
    
    #switchLangBtn:hover {
      transform: rotate(180deg);
      opacity: 1;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #switchLangBtn {
      border: none;
      background: transparent;
      width: 24px;
      height: 24px;
      cursor: pointer;
      color: var(--brass);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      opacity: 0.6;
    }
    
    #switchLangBtn:hover {
      transform: rotate(180deg);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>YuxTrans <span id="versionBadge" style="font-size: 10px; opacity: 0.5; font-weight: 400; margin-left: 4px;"></span></h1>
    <div class="header-btns">
      <button class="icon-btn" id="settingsBtn">⚙ 设置</button>
    </div>
  </div>

  <div class="card">
    <div class="label-row">
      <label>输入</label>
      <div class="lang-indicator">
        <span id="currentSourceLang">自动</span>
        <button id="switchLangBtn">⇄</button>
        <span id="currentTargetLang">中文</span>
      </div>
    </div>
    <textarea id="inputText" placeholder="输入内容... (⌘+Enter)"></textarea>
  </div>

  <button class="translate-btn" id="translateBtn">立即翻译</button>

  <div class="result-section" id="resultArea">
    <div class="card result-card">
      <div class="label-row">
        <label>结果</label>
        <div id="statusText" class="loading-indicator" style="display: none;">
          <div class="spinner"></div>
          <span>TRANSLATING</span>
        </div>
      </div>
      <div class="result-text" id="resultText"></div>
    </div>

    <div class="action-row">
      <button class="btn-action" id="copyBtn">复制内容</button>
      <button class="btn-action" id="clearBtn">移除所有</button>
    </div>
  </div>

  <div id="updateToast" class="toast">核心配置更新成功</div>

  <script src="popup.js"></script>
</body>
</html>
